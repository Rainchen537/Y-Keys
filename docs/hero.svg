<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8B63D9"/>
      <stop offset="0.54" stop-color="#F06A92"/>
      <stop offset="1" stop-color="#F9B36D"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="32" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1280" height="720" rx="42" fill="#171717"/>
  <ellipse cx="640" cy="360" rx="430" ry="250" fill="#ffffff" opacity="0.05"/>
  <rect x="42" y="38" width="1196" height="644" rx="28" fill="#202020" filter="url(#shadow)"/>
  <rect x="74" y="70" width="526" height="46" rx="8" fill="#383838"/>
  <text x="337" y="101" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="22" font-weight="700" fill="#f5f5f7">Codex</text>
  <rect x="680" y="70" width="526" height="46" rx="8" fill="#383838"/>
  <text x="943" y="101" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="22" font-weight="700" fill="#f5f5f7">系统</text>
  <g font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif" font-size="17" font-weight="600" fill="#f5f5f7">
    <rect x="74" y="146" width="226" height="30" rx="7" fill="#3a3a3a"/>
    <text x="98" y="168">File</text>
    <text x="92" y="209">⇧⌘ N</text><text x="176" y="209">New Window</text>
    <text x="112" y="244">⌘ N</text><text x="176" y="244">New Chat</text>
    <text x="96" y="279">⌥⌘ N</text><text x="176" y="279">Quick Chat</text>
    <rect x="74" y="312" width="226" height="30" rx="7" fill="#3a3a3a"/>
    <text x="98" y="334">Edit</text>
    <text x="112" y="375">⌘ Z</text><text x="176" y="375">Undo</text>
    <text x="92" y="410">⇧⌘ Z</text><text x="176" y="410">Redo</text>
    <text x="112" y="445">⌘ X</text><text x="176" y="445">Cut</text>
    <text x="112" y="480">⌘ C</text><text x="176" y="480">Copy</text>
    <text x="112" y="515">⌘ V</text><text x="176" y="515">Paste</text>
    <rect x="330" y="146" width="270" height="30" rx="7" fill="#3a3a3a"/>
    <text x="354" y="168">View</text>
    <text x="372" y="209">⌘ B</text><text x="446" y="209">Toggle Sidebar</text>
    <text x="372" y="244">⌘ J</text><text x="446" y="244">Toggle Bottom Panel</text>
    <text x="352" y="279">⌥⌘ B</text><text x="446" y="279">Toggle Side Panel</text>
    <rect x="330" y="312" width="270" height="30" rx="7" fill="#3a3a3a"/>
    <text x="354" y="334">Help</text>
    <text x="352" y="375">⇧⌘ /</text><text x="446" y="375">Keyboard Shortcuts</text>
  </g>
  <g font-family="-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif" font-size="17" font-weight="600" fill="#f5f5f7">
    <rect x="680" y="146" width="360" height="30" rx="7" fill="#3a3a3a"/>
    <text x="704" y="168">截屏和录制</text>
    <text x="714" y="209">⇧⌘ 3</text><text x="820" y="209">将屏幕图片存储为文件</text>
    <text x="690" y="244">⌃⇧⌘ 3</text><text x="820" y="244">将屏幕图片拷贝到剪切板</text>
    <text x="714" y="279">⇧⌘ 4</text><text x="820" y="279">将所选区域存储为文件</text>
    <rect x="680" y="312" width="526" height="38" rx="8" fill="#148BFF"/>
    <text x="714" y="337">⌥⌘ =</text><text x="820" y="337">放大</text>
    <rect x="680" y="384" width="360" height="30" rx="7" fill="#3a3a3a"/>
    <text x="704" y="406">聚焦和访达</text>
    <text x="726" y="447">⌘ Space</text><text x="820" y="447">显示「聚焦」搜索</text>
    <text x="702" y="482">⌥⌘ Space</text><text x="820" y="482">显示 Finder 搜索窗口</text>
    <rect x="680" y="516" width="360" height="30" rx="7" fill="#3a3a3a"/>
    <text x="704" y="538">输入法</text>
    <text x="726" y="579">⌃ Space</text><text x="820" y="579">选择上一个输入法</text>
  </g>
  <rect x="506" y="566" width="268" height="82" rx="22" fill="url(#accent)" opacity="0.95"/>
  <text x="640" y="620" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="42" font-weight="800" fill="#fff">Y-Keys</text>
</svg>
